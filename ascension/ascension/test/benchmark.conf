server:
    listen: 127.0.0.1@5000
    listen: ::@5000
    pidfile: knot.pid
    rundir: .
    tcp-io-timeout: 10000

acl:
  - id: transfers
    address: [127.0.0.1, ::1]
    action: transfer

database:
    storage: .

zone:
  - domain: 1000
    storage: zones
    acl: transfers
    serial-policy: dateserial

zone:
  - domain: 10000
    storage: zones
    acl: transfers
    serial-policy: dateserial

zone:
  - domain: 100000
    storage: zones
    acl: transfers
    serial-policy: dateserial

zone:
  - domain: 1000000
    storage: zones
    acl: transfers
    serial-policy: dateserial

log:
  - target: stdout
    any: debug
