options {
    port 5000;
    directory ".";
    pid-file "/run/named/named.pid";

    // Uncomment these to enable IPv6 connections support
    // IPv4 will still work:
    // listen-on-v6 { any; };
    // Add this for no IPv4:
    // listen-on { none; };

    version none;
    hostname none;
    server-id none;
};

zone "gnunet.gnu" IN {
    type master;
    file "gnunet.zone";
    allow-query { any; };
    allow-transfer { any; };
};
