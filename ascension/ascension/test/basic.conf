server:
    listen: 127.0.0.1@5000
    listen: ::@5000
    pidfile: knot.pid
    rundir: .

acl:
  - id: transfers
    address: [127.0.0.1, ::1]
    action: transfer

database:
    storage: .


zone:
  - domain: gnunet.gnu
    storage: zones
    acl: transfers
    serial-policy: dateserial

zone:
  - domain: io
    storage: zones
    acl: transfers
    serial-policy: dateserial

zone:
  - domain: 1000
    storage: zones
    acl: transfers
    serial-policy: dateserial

log:
  - target: stdout
    any: info
